name: API CI
on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
        - info
        - warning
        - debug
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - '!app/**.md'
      - '!app/.gitignore'
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**'
      - '!app/**.md'
      - '!app/.gitignore'
jobs:
  run-unit-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      QIITA_URL: 'https://qiita.com'
      ZENN_URL: 'https://zenn.dev'
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run unit tests
        run: pnpm vitest run
  run-e2e-tests:
    needs: [run-unit-tests]
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'
          cache-dependency-path: |
            app/pnpm-lock.yaml
            e2e/pnpm-lock.yaml
      - name: Install api app dependencies
        run: pnpm install --frozen-lockfile
        working-directory: app
      - name: Run api
        env:
          QIITA_URL: 'http://localhost:3000'
          ZENN_URL: 'http://localhost:3001'
        run: pnpm tsx src/main/index.ts &
        working-directory: app
      - name: Install E2E dependencies
        run: pnpm install --frozen-lockfile
        working-directory: e2e
      - name: Run e2e tests
        env:
          QIITA_URL: 'http://localhost:3000'
          ZENN_URL: 'http://localhost:3001'
        run: pnpm vitest run
        working-directory: e2e
      - name: Down api
        run: fuser -k -9 13000/tcp
  build-image:
    needs: [run-e2e-tests]
    timeout-minutes: 60
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: environment
    steps:
      - uses: actions/checkout@v4
      - name: Install Skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/v2.18.1/skaffold-linux-amd64
          sudo install skaffold /usr/local/bin/
      - name: Build docker image
        run: skaffold build -t ${GITHUB_SHA}
